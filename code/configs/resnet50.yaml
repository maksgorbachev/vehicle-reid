# ResNet-50 + BNNeck Configuration
# =================================
# Конфигурация для GTX 1660 Super (6GB VRAM)

model:
  type: resnet50
  backbone: resnet50
  pretrained: true
  last_stride: 1
  embedding_dim: 2048

data:
  dataset: VeRi-776
  data_dir: ./data/VeRi-776
  img_size: [256, 128]  # [height, width]
  num_workers: 4

training:
  epochs: 120
  # Для 6GB VRAM: P=8, K=4 = 32 изображения
  batch_size: 32
  p: 8   # идентичностей в батче (было 16)
  k: 4   # изображений каждой идентичности

  optimizer: adam
  lr: 0.00035
  weight_decay: 0.0005

  scheduler: cosine
  warmup_epochs: 5

  # Mixed precision для экономии памяти
  fp16: true

loss:
  ce_weight: 1.0
  triplet_weight: 1.0
  margin: 0.3
  label_smooth: 0.1

augmentation:
  random_erasing_prob: 0.5
  color_jitter: true
  random_horizontal_flip: true

reranking:
  enabled: true
  k1: 20
  k2: 6
  lambda_value: 0.3

evaluation:
  eval_freq: 10
  max_rank: 50
  remove_same_camera: true

output:
  save_dir: ./checkpoints/resnet50
  log_dir: ./logs/resnet50
